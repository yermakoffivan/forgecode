auto_open_dump = false
max_conversations = 100
max_commit_count = 20
max_extensions = 15
max_fetch_chars = 50000
max_file_read_batch_size = 50
max_file_size_bytes = 104857600
max_image_size_bytes = 262144
max_line_chars = 2000
max_parallel_file_reads = 64
max_read_lines = 2000
max_requests_per_turn = 100
max_search_lines = 1000
max_search_result_bytes = 10240
max_sem_search_results = 100
max_stdout_line_chars = 500
max_stdout_prefix_lines = 100
max_stdout_suffix_lines = 100
max_tokens = 20480
max_tool_failure_per_turn = 3
model_cache_ttl_secs = 604800
restricted = false
sem_search_top_k = 10
services_url = "https://api.forgecode.dev/"
terminal_context = false
tool_supported = true
tool_timeout_secs = 300
top_k = 30
top_p = 0.8
verify_todos = true
research_subagent = false
currency_symbol = "$"
currency_conversion_rate = 1.0
subagents = true
use_forge_committer = true
use_text_patch_fallback = false

[retry]
backoff_factor = 2
initial_backoff_ms = 200
max_attempts = 8
min_delay_ms = 1000
status_codes = [429, 500, 502, 503, 504, 408, 522, 524, 520, 529]
suppress_errors = false

[http]
accept_invalid_certs = false
adaptive_window = true
connect_timeout_secs = 30
hickory = false
keep_alive_interval_secs = 60
keep_alive_timeout_secs = 10
keep_alive_while_idle = true
max_redirects = 10
pool_idle_timeout_secs = 90
pool_max_idle_per_host = 5
read_timeout_secs = 900
tls_backend = "default"

[compact]
eviction_window = 0.2
max_tokens = 2000
message_threshold = 200
on_turn_end = false
retention_window = 6
token_threshold = 100000

[updates]
auto_update = true
frequency = "daily"

[reasoning]
enabled = true
effort = "medium"
